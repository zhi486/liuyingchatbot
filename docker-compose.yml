version: "3.8"

services:
  chatbot:
    build: .
    container_name: liuying-chatbot
    ports:
      - "7860:7860"
    volumes:
      - ./localmodel/models:/app/models:ro
      - ./localmodel/.env:/app/.env:ro
      - ./localmodel/histories:/app/histories
      - ./localmodel/voices:/app/voices
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
